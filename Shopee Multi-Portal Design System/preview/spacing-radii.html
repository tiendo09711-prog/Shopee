<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head><body>
<div class="kicker">Radii</div>
<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:10px;text-align:center">
  <div><div style="height:60px;background:#fff5f1;border:1px solid #ee4d2d;border-radius:2px"></div><div style="font:500 12px system-ui;margin-top:4px">2px</div><div class="hex">--radius-xs</div></div>
  <div><div style="height:60px;background:#fff5f1;border:1px solid #ee4d2d;border-radius:3px"></div><div style="font:500 12px system-ui;margin-top:4px">3px</div><div class="hex">--radius-sm</div></div>
  <div><div style="height:60px;background:#fff5f1;border:1px solid #ee4d2d;border-radius:4px"></div><div style="font:500 12px system-ui;margin-top:4px">4px</div><div class="hex">--radius (core)</div></div>
  <div><div style="height:60px;background:#fff5f1;border:1px solid #ee4d2d;border-radius:6px"></div><div style="font:500 12px system-ui;margin-top:4px">6px</div><div class="hex">--radius-md</div></div>
  <div><div style="height:60px;background:#fff5f1;border:1px solid #ee4d2d;border-radius:10px"></div><div style="font:500 12px system-ui;margin-top:4px">10px</div><div class="hex">--radius-xl</div></div>
  <div><div style="height:60px;background:#fff5f1;border:1px solid #ee4d2d;border-radius:24px"></div><div style="font:500 12px system-ui;margin-top:4px">24px</div><div class="hex">--radius-admin</div></div>
  <div><div style="height:60px;background:#fff5f1;border:1px solid #ee4d2d;border-radius:999px"></div><div style="font:500 12px system-ui;margin-top:4px">pill</div><div class="hex">--radius-pill</div></div>
</div>
</body></html>
