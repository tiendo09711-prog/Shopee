<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head><body>
<div class="kicker">Buttons · Customer / Seller</div>
<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
  <button style="height:42px;padding:0 18px;border:0;border-radius:3px;background:#ee4d2d;color:#fff;font:500 15px Roboto;cursor:pointer">Đăng nhập</button>
  <button style="height:42px;padding:0 18px;border:1px solid #f0b5a9;border-radius:3px;background:#fff;color:#ee4d2d;font:500 15px Roboto;cursor:pointer">Hủy</button>
  <button style="height:42px;padding:0 18px;border:1px solid #d9d9d9;border-radius:3px;background:#fff;color:#333;font:500 15px Roboto;cursor:pointer">Outline</button>
  <button style="height:34px;padding:0 18px;border:0;border-radius:6px;background:#ee4d2d;color:#fff;font:500 14px Roboto;cursor:pointer">Thanh toán</button>
  <button style="height:34px;padding:0 14px;border:0;border-radius:6px;background:transparent;color:#ee4d2d;font:500 14px Roboto;cursor:pointer">Xóa</button>
  <button disabled style="height:42px;padding:0 18px;border:0;border-radius:3px;background:#f7f7f7;color:#aaa;font:500 15px Roboto">Disabled</button>
</div>
<div class="kicker" style="margin-top:18px">Buttons · Admin</div>
<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;font-family:'IBM Plex Sans',sans-serif">
  <button style="min-height:44px;padding:0 18px;border:0;border-radius:14px;background:#f15a24;color:#fff;font-weight:700;cursor:pointer">Cập nhật cấu hình</button>
  <button style="min-height:40px;padding:0 16px;border:1px solid rgba(53,40,26,.12);border-radius:999px;background:#fffaf3;color:#1d1c1a;cursor:pointer">Khoá tài khoản</button>
  <button style="min-height:40px;padding:0 16px;border:1px solid rgba(53,40,26,.12);border-radius:999px;background:#fff2e8;color:#1d1c1a;cursor:pointer">Hover state</button>
</div>
</body></html>
