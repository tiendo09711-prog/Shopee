<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head><body>
<div class="kicker">Form fields</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;font-family:Roboto,sans-serif">
  <div>
    <div style="font:500 13px Roboto;margin-bottom:6px">Customer auth input</div>
    <input placeholder="Email/Số điện thoại" style="width:100%;height:44px;border:1px solid #e5e5e5;border-radius:2px;padding:0 14px;font:400 15px Roboto">
  </div>
  <div>
    <div style="font:500 13px Roboto;margin-bottom:6px">Seller input</div>
    <input placeholder="Tên shop" style="width:100%;border:1px solid #d9d9d9;border-radius:3px;padding:13px 14px;font:400 15px Roboto">
  </div>
  <div>
    <div style="font:500 13px Roboto;margin-bottom:6px">Search bar (header)</div>
    <div style="display:flex;background:#fff;padding:4px;border-radius:4px;border:2px solid #ee4d2d">
      <input placeholder="Tìm kiếm sản phẩm..." style="border:0;outline:none;flex:1;font-size:15px;padding:8px 14px">
      <button style="border:0;background:#fb5533;color:#fff;border-radius:4px;padding:0 18px;cursor:pointer">🔍</button>
    </div>
  </div>
  <div>
    <div style="font:500 13px Roboto;margin-bottom:6px">Admin search</div>
    <input placeholder="Tìm theo tên..." style="width:100%;min-height:44px;padding:0 14px;border:1px solid rgba(53,40,26,.12);border-radius:14px;background:#fffdf9;font:400 15px 'IBM Plex Sans'">
  </div>
</div>
</body></html>
